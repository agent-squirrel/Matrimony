services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in your .env file}
      DB_TYPE: mariadb
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-wedding_user}
      DB_PASS: ${DB_PASS:-wedding_password}
      DB_NAME: ${DB_NAME:-wedding_db}
    volumes:
      - uploads:/app/static/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mariadb:11
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-wedding_db}
      MYSQL_USER: ${DB_USER:-wedding_user}
      MYSQL_PASSWORD: ${DB_PASS:-wedding_password}
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  uploads:
  dbdata:
