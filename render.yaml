services:
  - type: web
    name: matrimony
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: matrimony-db
          property: connectionString
      - key: PORT
        value: 8000

databases:
  - name: matrimony-db
    databaseName: wedding_db
    plan: free
