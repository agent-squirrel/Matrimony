# Use this file when connecting to an existing database instead of spinning one up.
#
#   cp .env.example .env   # fill in DB_HOST, DB_USER, DB_PASS, DB_NAME, SECRET_KEY
#   docker compose -f docker-compose.external-db.yml up -d

services:
  app:
    build: .
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in your .env file}
      # Supply either DATABASE_URL or the individual DB_* vars below
      DATABASE_URL: ${DATABASE_URL:-}
      DB_HOST: ${DB_HOST:-localhost}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-wedding_user}
      DB_PASS: ${DB_PASS:-wedding_password}
      DB_NAME: ${DB_NAME:-wedding_db}
    volumes:
      - uploads:/app/static/uploads
    restart: unless-stopped

volumes:
  uploads:
